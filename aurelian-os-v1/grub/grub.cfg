# ============================================================================
# Aurelian OS — GRUB configuration for the bootable ISO
# ============================================================================
# This file is placed at /boot/grub/grub.cfg inside the ISO. `grub-mkrescue`
# uses it to present the boot menu. The kernel is a Multiboot2 ELF, so GRUB
# can load it directly with the `multiboot2` command.

set timeout=3
set default=0

insmod all_video
set gfxpayload=keep

menuentry "Aurelian OS 1.0.0-dev (Luma)" {
    multiboot2 /boot/aurelion.elf
    boot
}

menuentry "Aurelian OS 1.0.0-dev (Luma) — verbose boot" {
    multiboot2 /boot/aurelion.elf
    echo ""
    echo "Loading Aurelion kernel..."
    boot
}
